{% extends "base.html" %}
{% block title %}Login — Petal & Co{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap { max-width:420px; margin:3rem auto; padding:0 1.5rem 5rem; }
  .auth-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:2.5rem; }
  .auth-card h1 { font-family:'Cormorant Garamond',serif; font-size:1.9rem; margin-bottom:.3rem; }
  .auth-card .subtitle { font-size:.875rem; color:var(--muted); margin-bottom:2rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; font-size:.875rem; color:var(--muted); }
  .auth-footer a { color:var(--rose); text-decoration:none; font-weight:500; }
  .divider-or { text-align:center; color:var(--muted); font-size:.8rem; margin:1.2rem 0; position:relative; }
  .divider-or::before,.divider-or::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
  .divider-or::before { left:0; } .divider-or::after { right:0; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="section-header" style="padding-top:2rem;">
    <h1>Welcome Back</h1>
    <div class="divider"></div>
  </div>

  <div class="auth-card">
    <p class="subtitle">Log in to your account to place orders and track deliveries.</p>

    <form action="/login" method="post">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="your@email.com" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Register free</a>
      <div style="margin-top:.5rem;"><a href="/admin_login" style="color:var(--muted);font-size:.8rem;">Admin login →</a></div>
    </div>
  </div>
</div>
{% endblock %}
