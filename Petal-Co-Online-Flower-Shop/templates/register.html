{% extends "base.html" %}
{% block title %}Register — Petal & Co{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap { max-width:480px; margin:3rem auto; padding:0 1.5rem 5rem; }
  .auth-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:2.5rem; }
  .auth-card h1 { font-family:'Cormorant Garamond',serif; font-size:1.9rem; margin-bottom:.3rem; }
  .auth-card .subtitle { font-size:.875rem; color:var(--muted); margin-bottom:2rem; }
  .auth-footer { text-align:center; margin-top:1.5rem; font-size:.875rem; color:var(--muted); }
  .auth-footer a { color:var(--rose); text-decoration:none; font-weight:500; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  @media(max-width:480px){ .form-row{ grid-template-columns:1fr; } }
  .pw-strength { height:4px; border-radius:2px; margin-top:.4rem; background:var(--border); transition:all .3s; }
  .pw-strength-bar { height:100%; border-radius:2px; transition:all .3s; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="section-header" style="padding-top:2rem;">
    <h1>Create Account</h1>
    <div class="divider"></div>
  </div>

  <div class="auth-card">
    <p class="subtitle">Join Petal &amp; Co and start ordering fresh flowers today.</p>

    <form action="/register" method="post">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" required placeholder="Priya Sharma">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" name="phone" required placeholder="+91 98765 43210">
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="priya@example.com">
      </div>

      <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" name="address" required placeholder="House No, Street, City, PIN">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" id="pw" required placeholder="Min. 6 characters" oninput="checkStrength(this.value)">
          <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required placeholder="Re-enter password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">Create My Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Log in here</a>
    </div>
  </div>
</div>

<script>
function checkStrength(val) {
  const bar = document.getElementById('pwBar');
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  const colors = ['#e53935','#fb8c00','#fdd835','#43a047'];
  const widths = ['25%','50%','75%','100%'];
  if (val.length === 0) { bar.style.width='0'; return; }
  bar.style.width = widths[score-1] || '25%';
  bar.style.background = colors[score-1] || '#e53935';
}
</script>
{% endblock %}
